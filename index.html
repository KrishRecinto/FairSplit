<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FairSplit — Trip Expense Splitter</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <!-- Preload Firebase SDKs so they're cached before app.js needs them -->
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js">
</head>
<body>
  <header class="app-header">
    <div class="header-left">
      <h1 class="logo">FairSplit</h1>
    </div>
    <div class="header-right" style="display:flex;align-items:center;gap:10px;">
      <div class="trip-selector" id="tripSelector" style="display:none;">
        <button class="add-member-btn" id="addMemberBtn" title="Add member">+ <span class="add-member-text">add person</span></button>
        <select id="tripDropdown"></select>
      </div>
      <button class="user-btn" id="userBtn" style="display:none;" title="Account"></button>
      <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">&#9790;</button>
    </div>
  </header>

  <div class="add-member-panel" id="addMemberPanel" style="display:none;">
    <div class="add-member-inner">
      <input type="text" id="newMemberInput" placeholder="Enter name...">
      <button class="btn btn-primary btn-sm" id="confirmAddMember">Add</button>
      <button class="btn btn-secondary btn-sm" id="cancelAddMember">&times;</button>
    </div>
    <div class="add-member-chips" id="memberChips"></div>
  </div>

  <nav class="tab-bar" id="tabBar" style="display:none;">
    <button class="tab active" data-view="expenses">
      <span class="tab-icon">$</span>
      <span class="tab-label">Costs</span>
    </button>
    <button class="tab" data-view="dashboard">
      <span class="tab-icon">&#9776;</span>
      <span class="tab-label">Dashboard</span>
    </button>
    <button class="tab" data-view="settle">
      <span class="tab-icon">&#8644;</span>
      <span class="tab-label">Settle</span>
    </button>
    <button class="tab" data-view="import">
      <span class="tab-icon">&#8645;</span>
      <span class="tab-label">Import</span>
    </button>
  </nav>

  <!-- Login screen -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-icon">$</div>
      <h2>Welcome to FairSplit</h2>
      <p>Split trip expenses fairly with friends. Sign in to sync your trips across devices and collaborate in real time.</p>
      <button class="btn btn-google" id="googleSignIn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>
    </div>
  </div>

  <!-- Loading spinner -->
  <div class="loading-screen" id="loadingScreen" style="display:none;">
    <div class="spinner"></div>
    <p>Loading your trips...</p>
  </div>

  <main class="content" id="content" style="display:none;">
    <div id="view-trips" class="view"></div>
    <div id="view-expenses" class="view" style="display:none;"></div>
    <div id="view-dashboard" class="view" style="display:none;"></div>
    <div id="view-settle" class="view" style="display:none;"></div>
    <div id="view-import" class="view" style="display:none;"></div>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
