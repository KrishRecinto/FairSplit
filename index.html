<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FairSplit — Split Expenses Fairly</title>
  <meta name="description" content="Split expenses fairly with friends — trips, meals, rent, and more.">

  <!-- Open Graph (iMessage, WhatsApp, Slack, etc.) -->
  <meta property="og:title" content="FairSplit">
  <meta property="og:description" content="Split expenses fairly with friends — trips, meals, rent, and more.">
  <meta property="og:image" content="https://fair-split-website.vercel.app/assets/og-image.png">
  <meta property="og:url" content="https://fair-split-website.vercel.app">
  <meta property="og:type" content="website">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="FairSplit">
  <meta name="twitter:description" content="Split expenses fairly with friends — trips, meals, rent, and more.">
  <meta name="twitter:image" content="https://fair-split-website.vercel.app/assets/og-image.png">

  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <!-- Preload Firebase SDKs so they're cached before app.js needs them -->
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js">
</head>
<body>
  <header class="app-header">
    <div class="header-left">
      <h1 class="logo">FairSplit</h1>
    </div>
    <div class="header-right" style="display:flex;align-items:center;gap:10px;">
      <div class="trip-selector" id="tripSelector" style="display:none;">
        <button class="add-member-btn" id="addMemberBtn" title="Add member">+ <span class="add-member-text">add person</span></button>
        <select id="tripDropdown"></select>
        <button class="add-member-btn" id="shareBtn" title="Share group" style="display:none;">Share</button>
      </div>
      <button class="user-btn" id="userBtn" style="display:none;" title="Account"></button>
      <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">&#9790;</button>
    </div>
  </header>

  <div class="add-member-panel" id="addMemberPanel" style="display:none;">
    <div class="add-member-inner">
      <input type="text" id="newMemberInput" placeholder="Enter name...">
      <button class="btn btn-primary btn-sm" id="confirmAddMember">Add</button>
      <button class="btn btn-secondary btn-sm" id="cancelAddMember">&times;</button>
    </div>
    <div class="add-member-chips" id="memberChips"></div>
  </div>

  <nav class="tab-bar" id="tabBar" style="display:none;">
    <button class="tab active" data-view="expenses">
      <span class="tab-icon">$</span>
      <span class="tab-label">Costs</span>
    </button>
    <button class="tab" data-view="import">
      <span class="tab-icon">&#128196;</span>
      <span class="tab-label">Receipt</span>
    </button>
    <button class="tab" data-view="dashboard">
      <span class="tab-icon">&#9776;</span>
      <span class="tab-label">Dashboard</span>
    </button>
  </nav>

  <!-- Login screen (hidden by default — shown only if not signed in) -->
  <div class="login-screen" id="loginScreen" style="display:none;">
    <div class="login-card">
      <div class="login-icon">$</div>
      <h2>Welcome to FairSplit</h2>
      <p>Sign in to sync your data across devices and share groups with friends for real-time collaboration.</p>
      <button class="btn btn-google" id="googleSignIn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>
    </div>
  </div>

  <!-- Guest join screen (for share link visitors) -->
  <div class="login-screen" id="guestJoinScreen" style="display:none;">
    <div class="login-card">
      <div class="login-icon">$</div>
      <h2 id="guestTripName">You've been invited!</h2>
      <p>Enter your name to join this group and start adding expenses.</p>
      <input type="text" id="guestNameInput" placeholder="Your name" style="width:100%;padding:12px;border-radius:8px;border:1px solid var(--border);font-size:1rem;margin-bottom:12px;box-sizing:border-box;">
      <button class="btn btn-primary btn-block" id="guestJoinBtn">Join Group</button>
      <div id="guestJoinMsg" style="margin-top:8px;color:var(--danger);font-size:0.85rem;"></div>
      <div style="margin-top:16px;text-align:center;">
        <span style="font-size:0.85rem;color:var(--text-muted);">Have an account?</span>
        <button class="btn btn-secondary btn-sm" id="guestSwitchToLogin" style="margin-left:6px;">Sign in with Google</button>
      </div>
    </div>
  </div>

  <!-- Loading spinner (hidden by default — shown during Firestore sync) -->
  <div class="loading-screen" id="loadingScreen" style="display:none;">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>

  <main class="content" id="content" style="display:block;">
    <div id="view-trips" class="view"></div>
    <div id="view-expenses" class="view" style="display:none;"></div>
    <div id="view-dashboard" class="view" style="display:none;"></div>
<div id="view-import" class="view" style="display:none;"></div>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
